name: mpstats_update

# Триггер только для ручного запуска (и запуска через API)
on:
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Устанавливаем Python 3.9
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy python-dotenv google-api-python-client google-auth

      # === ШАГ 1: Запуск основного скрипта ===
      - name: Run Main MPStats update script
        env:
          TOKEN: ${{ secrets.TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: python mpstats_update.py

      # === ШАГ 2: Запуск скрипта сезонности ===
      - name: Run Seasonality script
        env:
          TOKEN: ${{ secrets.TOKEN }}
          WEBHOOK_URL_1: ${{ secrets.WEBHOOK_URL_1 }} # Ссылка на вебхук для сезонности
        run: python season_effects_general.py
